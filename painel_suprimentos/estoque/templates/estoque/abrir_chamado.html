{% extends 'estoque/base.html' %}

{% block content %}

<div class="container-form">

    <div class="form-card-header">
        <h1>Abrir Chamado</h1>
        <p>Descreva o problema para que a equipe possa ajudar rapidamente.</p>
    </div>

    <form method="POST" class="formulario">

        {% csrf_token %}

        <div class="campo">
            <label>Título</label>
            {{ form.titulo }}
        </div>

        <div class="campo">
            <label>Categoria</label>
            {{ form.categoria }}
        </div>

        <div class="campo">
            <label>Descrição</label>
            {{ form.descricao }}
        </div>

        <button type="submit" class="btn">
            Abrir Chamado
        </button>

    </form>

</div>

{% endblock %}
