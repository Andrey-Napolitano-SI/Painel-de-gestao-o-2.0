{% extends 'estoque/base.html' %}

{% block content %}

<h1>ITENS COM ESTOQUE BAIXO</h1>

<table>

    <tr>
        <th>Produto</th>
        <th>Categoria</th>
        <th>Quantidade</th>
        <th>Mínimo</th>
        <th>Status</th>
    </tr>

    {% for produto in produtos %}

    <tr>
        <td>{{ produto.nome }}</td>
        <td>{{ produto.categoria }}</td>
        <td>{{ produto.quantidade }}</td>
        <td>{{ produto.minimo }}</td>
        <td>{{ produto.status }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
