{% extends 'estoque/base.html' %}

{% block content %}

<div class="container-form">

    <div class="form-card-header">
        <h1>Editar Item</h1>
        <p>Atualize as informações do produto de forma rápida e segura.</p>
    </div>

    <form method="POST" class="formulario">

    {% csrf_token %}

        <div class="campo">
            <label>Nome</label>
            {{ form.nome }}
        </div>

        <div class="campo">
            <label>Categoria</label>
            {{ form.categoria }}
        </div>

        <div class="campo">
            <label>Quantidade</label>
            {{ form.quantidade }}
        </div>

        <div class="campo">
            <label>Estoque Mínimo</label>
            {{ form.minimo }}
        </div>

        <div class="campo">
            <label>Local</label>
            {{ form.local }}
        </div>

        <div class="campo">
            <label>Status</label>
            {{ form.status }}
        </div>

        <button type="submit" class="btn">
            Atualizar
        </button>

    </form>

</div>

{% endblock %}
